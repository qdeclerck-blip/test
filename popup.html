<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <!-- Navbar -->
  <nav class="navbar">
    <div class="navbar-brand">
      <svg class="navbar-logo" viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="#f8f9fa" stroke-width="2">
        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
        <polyline points="9 22 9 12 15 12 15 22"/>
      </svg>
      <span>ImmoTracker</span>
    </div>
    <div class="navbar-actions">
      <button id="btn-compare" class="nav-btn" disabled>Comparer (<span id="compare-count">0</span>)</button>
      <button id="btn-export" class="nav-btn">Exporter CSV</button>
    </div>
  </nav>

  <!-- Kanban board -->
  <div class="kanban-board" id="kanban-board"></div>

  <!-- Compare modal -->
  <div id="compare-modal" class="modal-overlay">
    <div class="modal">
      <div class="modal-header">
        <h2>Comparateur</h2>
        <button id="modal-close" class="modal-close">×</button>
      </div>
      <div class="modal-body">
        <table id="compare-table" class="compare-table"></table>
      </div>
    </div>
  </div>

  <!-- Edit modal -->
  <div id="edit-modal" class="modal-overlay">
    <div class="modal modal-edit">
      <div class="modal-header">
        <h2>Modifier le bien</h2>
        <button id="edit-modal-close" class="modal-close">×</button>
      </div>
      <div class="modal-body" id="edit-modal-body"></div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
